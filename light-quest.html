                    setGameState('y56_1c');
                }
            };

            const handleAnswer = (option) => {
                if (option.isCorrect) {
                setScores(prev => ({ ...prev, [gameState]: 1 }));
                }
                setFeedback({ correct: option.isCorrect, text: option.feedback, next: option.nextNode });
            };

            const advanceLevel = () => {
                let nextNode = feedback.next;
                if (typeof nextNode === 'function') {
                nextNode = nextNode(scores);
                }
                if (nextNode === 'remedial_intro') setProgress(p => ({ ...p, didRemedial: true }));
                if (nextNode === 'intro_78') setProgress(p => ({ ...p, reached78: true }));
                if (nextNode === 'intro_910') setProgress(p => ({ ...p, reached910: true }));
                setGameState(nextNode);
                setFeedback(null);
            };

            const submitData = async () => {
                setIsSubmitting(true);
                const concept56 = scores.y56_1c + scores.y56_2c + scores.y56_3c + scores.y56_4c + 
                                scores.y56b_1c + scores.y56b_2c + scores.y56b_3c + scores.y56b_4c;
                const concept78 = scores.y78_1c + scores.y78_2c;
                const concept910 = scores.y910_1c + scores.y910_2c;
                const inquiryTotal = scores.y56_1e + scores.y56_2e + scores.y56_3e + scores.y56_4e + 
                                    scores.y56b_1e + scores.y56b_2e + scores.y56b_3e + scores.y56b_4e +
                                    scores.y78_1e + scores.y78_2e + 
                                    scores.y910_1e + scores.y910_2e;
                                    
                const totalScore = concept56 + concept78 + concept910 + inquiryTotal;
                
                // Using the specific Google Apps Script URL provided
                const scriptUrl = 'https://script.google.com/macros/s/AKfycbxHrKvYJKuz9D-6Mf5bdiNnFo3h1xGywtk0zWWkUusn2OcjQe3NEVqq6YBH_tX3X6RY/exec'; 

                const payload = {
                firstName: firstName, lastName: lastName, studentClass: studentClass, total: totalScore, 
                c_stage1: concept56, c_stage2: concept78, c_stage3: concept910, inquiry: inquiryTotal, 
                remedial_used: progress.didRemedial, details: scores
                };

                try {
                await fetch(scriptUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                
                setTimeout(() => {
                    setGameState('submitted');
                    setIsSubmitting(false);
                }, 1500);
                } catch (error) {
                console.error("Submission Error: ", error);
                alert("There was an error saving your score. Please ensure you have an internet connection.");
                setIsSubmitting(false);
                }
            };

            if (gameState === 'start') {
                return (
                <div className="min-h-screen text-white flex flex-col items-center justify-center p-6 font-sans">
                    <div className="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 text-center">
                    <div className="flex justify-center mb-6 relative">
                        <Sun size={64} className="opacity-100 drop-shadow-[0_0_15px_rgba(250,204,21,0.8)]" />
                    </div>
                    <h1 className="text-4xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500">
                        Light Quest
                    </h1>
                    <p className="text-slate-400 mb-8">Test your science knowledge to escape the Pharaoh's Tomb. Do you have what it takes to reach the Inner Sanctum?</p>
                    
                    <form onSubmit={handleStart} className="space-y-4">
                        <div className="flex gap-4">
                            <input 
                            type="text" 
                            placeholder="First Name" 
                            className="w-full p-4 rounded-xl bg-slate-900 border border-slate-600 focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400 outline-none transition-all text-white"
                            value={firstName}
                            onChange={(e) => setFirstName(e.target.value)}
                            required
                            />
                            <input 
                            type="text" 
                            placeholder="Last Name" 
                            className="w-full p-4 rounded-xl bg-slate-900 border border-slate-600 focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400 outline-none transition-all text-white"
                            value={lastName}
                            onChange={(e) => setLastName(e.target.value)}
                            required
                            />
                        </div>
                        <select 
                            className="w-full p-4 rounded-xl bg-slate-900 border border-slate-600 focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400 outline-none transition-all text-white appearance-none"
                            value={studentClass}
                            onChange={(e) => setStudentClass(e.target.value)}
                            required
                        >
                            <option value="" disabled>Select your class...</option>
                            <option value="5A">5A</option>
                            <option value="5B">5B</option>
                            <option value="5C">5C</option>
                            <option value="6A">6A</option>
                            <option value="6B">6B</option>
                        </select>
                        <button type="submit" className="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-transform hover:scale-105">
                        Start Expedition <Play size={20} />
                        </button>
                    </form>
                    </div>
                </div>
                );
            }

            if (gameState === 'end') {
                const concept56 = scores.y56_1c + scores.y56_2c + scores.y56_3c + scores.y56_4c + scores.y56b_1c + scores.y56b_2c + scores.y56b_3c + scores.y56b_4c;
                const concept78 = scores.y78_1c + scores.y78_2c;
                const concept910 = scores.y910_1c + scores.y910_2c;
                const inquiryTotal = scores.y56_1e + scores.y56_2e + scores.y56_3e + scores.y56_4e + 
                                    scores.y56b_1e + scores.y56b_2e + scores.y56b_3e + scores.y56b_4e +
                                    scores.y78_1e + scores.y78_2e + scores.y910_1e + scores.y910_2e;
                                    
                const max56 = progress.didRemedial ? 8 : 4;
                const maxInquiry = progress.didRemedial ? 8 + (progress.reached78 ? 2 : 0) + (progress.reached910 ? 2 : 0) : 4 + (progress.reached78 ? 2 : 0) + (progress.reached910 ? 2 : 0);

                return (
                <div className="min-h-screen text-white p-6 md:p-12 font-sans flex items-center justify-center">
                    <div className="bg-slate-800 p-8 rounded-2xl shadow-xl text-center max-w-4xl w-full">
                    <h2 className="text-4xl font-bold mb-2 text-yellow-400">Expedition Complete</h2>
                    <p className="text-xl text-slate-300 mb-8">Analysis for Explorer {firstName} {lastName} ({studentClass}):</p>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8 text-left">
                        <div className="bg-slate-900 rounded-xl p-5 border border-yellow-600/50 relative overflow-hidden">
                        <h4 className="font-bold text-yellow-500 text-sm mb-4 flex items-center gap-2 border-b border-slate-700 pb-2">
                            Stage 1: Core Concepts
                        </h4>
                        <div className="text-3xl font-bold text-white mb-2">{concept56} <span className="text-lg text-slate-500">/ {max56}</span></div>
                        <p className="text-xs text-slate-400 uppercase tracking-wider">Concepts Mastered</p>
                        </div>

                        <div className={`bg-slate-900 rounded-xl p-5 border ${progress.reached78 ? 'border-indigo-600/50' : 'border-slate-700'} relative overflow-hidden`}>
                        {!progress.reached78 && <div className="absolute inset-0 bg-slate-900/80 flex items-center justify-center z-10"><Lock size={32} /></div>}
                        <h4 className="font-bold text-indigo-400 text-sm mb-4 flex items-center gap-2 border-b border-slate-700 pb-2">
                            Stage 2: Adv. Energy
                        </h4>
                        <div className="text-3xl font-bold text-white mb-2">{concept78} <span className="text-lg text-slate-500">/ 2</span></div>
                        <p className="text-xs text-slate-400 uppercase tracking-wider">Concepts Mastered</p>
                        </div>

                        <div className={`bg-slate-900 rounded-xl p-5 border ${progress.reached910 ? 'border-purple-600/50' : 'border-slate-700'} relative overflow-hidden`}>
                        {!progress.reached910 && <div className="absolute inset-0 bg-slate-900/80 flex items-center justify-center z-10"><Lock size={32} /></div>}
                        <h4 className="font-bold text-purple-400 text-sm mb-4 flex items-center gap-2 border-b border-slate-700 pb-2">
                            Stage 3: Wave Theory
                        </h4>
                        <div className="text-3xl font-bold text-white mb-2">{concept910} <span className="text-lg text-slate-500">/ 2</span></div>
                        <p className="text-xs text-slate-400 uppercase tracking-wider">Concepts Mastered</p>
                        </div>

                        <div className="bg-slate-900 rounded-xl p-5 border border-green-600/50 relative overflow-hidden">
                        <h4 className="font-bold text-green-400 text-sm mb-4 flex items-center gap-2 border-b border-slate-700 pb-2">
                            Inquiry Skills
                        </h4>
                        <div className="text-3xl font-bold text-white mb-2">{inquiryTotal} <span className="text-lg text-slate-500">/ {maxInquiry}</span></div>
                        <p className="text-xs text-slate-400 uppercase tracking-wider">Total Demonstrated</p>
                        </div>
                    </div>

                    <button onClick={submitData} disabled={isSubmitting} className="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-8 rounded-xl flex items-center justify-center gap-2 mx-auto transition-colors disabled:opacity-70">
                        {isSubmitting ? 'Sending to Teacher...' : 'Submit Final Report'}
                    </button>
                    </div>
                </div>
                );
            }

            if (gameState === 'submitted') {
                return (
                <div className="min-h-screen text-white flex items-center justify-center p-6">
                    <div className="bg-slate-800 p-8 rounded-2xl shadow-xl text-center">
                    <CheckCircle size={80} className="mx-auto mb-6 text-green-500" />
                    <h2 className="text-3xl font-bold mb-4">Data Uploaded!</h2>
                    <p className="text-slate-300 text-lg mb-8">Your results have been sent securely to your teacher.</p>
                    <button onClick={() => window.location.reload()} className="text-slate-400 hover:text-white underline">Play again</button>
                    </div>
                </div>
                );
            }

            const node = quizGraph[gameState];

            if (node.type === 'intro') {
                return (
                <div className="min-h-screen text-white p-6 md:p-12 font-sans flex items-center justify-center">
                    <div className={`bg-slate-800 p-8 rounded-2xl shadow-xl border-t-4 border-${node.color}-500 text-center max-w-xl`}>
                    <div className="flex justify-center mb-6">
                        <Unlock size={64} className={`text-${node.color}-400`} />
                    </div>
                    <h3 className="text-3xl font-bold mb-4">{node.title}</h3>
                    <p className="text-xl text-slate-300 mb-8">{node.text}</p>
                    <button onClick={() => { setGameState(node.nextNode); setFeedback(null); }} className={`bg-${node.color}-600 hover:bg-${node.color}-500 text-white px-8 py-4 rounded-xl font-bold transition-colors w-full`}>
                        Enter Chamber
                    </button>
                    </div>
                </div>
                );
            }

            return (
                <div className="min-h-screen text-white p-6 md:p-12 font-sans">
                <div className="max-w-3xl mx-auto">
                    <div className="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
                    <h2 className="text-xl font-bold text-yellow-400">Agent: {firstName} {lastName}</h2>
                    <div className="text-sm font-medium px-3 py-1 rounded-full bg-slate-800 text-slate-400">
                        {node.type === 'concept' ? 'Science Concept' : 'Science Inquiry Skill'}
                    </div>
                    </div>

                    <div className={`bg-slate-800 p-8 rounded-2xl shadow-xl border-t-4 ${node.type === 'concept' ? 'border-yellow-500' : 'border-blue-500'}`}>
                    <div className="flex items-center gap-4 mb-6">
                        <div className="bg-slate-900 p-3 rounded-xl">{node.icon}</div>
                        <h3 className="text-2xl font-bold">{node.title}</h3>
                    </div>
                    
                    <p className="mb-6 text-slate-300 text-lg italic bg-slate-900/50 p-4 rounded-lg border-l-4 border-slate-600">
                        {node.scenario}
                    </p>

                    <p className="mb-6 text-xl font-semibold">{node.question}</p>

                    <div className="space-y-3">
                        {node.options.map((option, idx) => (
                        <button key={idx} disabled={feedback !== null} onClick={() => handleAnswer(option)} className="w-full p-4 bg-slate-700 hover:bg-slate-600 rounded-xl text-left font-medium transition-colors disabled:opacity-50">
                            {option.text}
                        </button>
                        ))}
                    </div>

                    {feedback && (
                        <div className={`mt-6 p-6 rounded-xl border ${feedback.correct ? 'bg-green-900/50 border-green-500' : 'bg-red-900/50 border-red-500'}`}>
                        <div className="flex items-start gap-3">
                            {feedback.correct ? <CheckCircle size={32} className="text-green-400 shrink-0" /> : <XCircle size={32} className="text-red-400 shrink-0" />}
                            <div>
                            <p className="text-lg font-medium text-white mb-4">{feedback.text}</p>
                            <button onClick={advanceLevel} className="bg-white text-slate-900 px-6 py-2 rounded-lg font-bold hover:bg-slate-200 transition-colors">
                                Next Question
                            </button>
                            </div>
                        </div>
                        </div>
                    )}
                    </div>
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
